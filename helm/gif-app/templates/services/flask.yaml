apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-flask
  labels:
    app: flask-app
spec:
  type: {{ .Values.flask.service.type }}
  ports:
    - port: {{ .Values.flask.service.port }}
      targetPort: {{ .Values.flask.service.port }}
      name: http
  selector:
    app: flask-app